name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build WorkScope.exe (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Show environment
        shell: pwsh
        run: |
          python --version
          pip --version
          Get-Location
          Get-ChildItem

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: ~\.paddleocr
          key: ${{ runner.os }}-paddleocr-models-v1
          restore-keys: |
            ${{ runner.os }}-paddleocr-models-

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: Show installed packages
        shell: pwsh
        run: |
          pip list

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller pyinstaller.spec --noconfirm --clean

      - name: Verify build artifact
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist/WorkScope.exe")) {
            Write-Error "dist/WorkScope.exe was not produced by PyInstaller"
            exit 1
          }
          Get-Item dist/WorkScope.exe | Format-List Name, Length, LastWriteTime

      - name: Stage release files
        shell: pwsh
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item dist/WorkScope.exe -Destination $stage/

          if (Test-Path installer) {
            Get-ChildItem installer -Filter *.bat | Copy-Item -Destination $stage/
            if (Test-Path installer/README_install.txt) {
              Copy-Item installer/README_install.txt -Destination $stage/
            }
          }

          if (Test-Path docs) {
            $htmls = Get-ChildItem docs -Filter *.html -ErrorAction SilentlyContinue
            if ($htmls) {
              $htmls | Copy-Item -Destination $stage/
            } else {
              Write-Host "No HTML files in docs/, skipping"
            }
          }

          Write-Host "=== Staged files ==="
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $zipName = "workscope-collector-windows-$sha.zip"
          Compress-Archive -Path "release-stage/*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
          Get-Item $zipName | Format-List Name, Length
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: workscope-collector-windows
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Attach to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
