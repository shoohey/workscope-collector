name: Release Check Gate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      expect_profile:
        description: '顧客別ビルド時の期待 DEFAULT_PROFILE 値（任意）'
        required: false
        type: string

jobs:
  release-check:
    name: Pre-release validation gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic==2.6.1 python-dateutil==2.8.2 Pillow==10.2.0 numpy

      - name: Run release_check.py
        run: |
          if [ -n "${{ inputs.expect_profile }}" ]; then
            python scripts/release_check.py --expect-profile "${{ inputs.expect_profile }}"
          else
            python scripts/release_check.py
          fi

      - name: Upload release check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-report
          path: docs/RELEASE_CHECK.md
          if-no-files-found: warn

  pii-safety-must-pass:
    name: PII Safety Tests (CRITICAL — release block on fail)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic==2.6.1 python-dateutil==2.8.2 Pillow==10.2.0 numpy

      - name: Run PII safety tests (must all pass)
        run: |
          pytest tests/test_pii_safety.py -v --tb=short
          pytest tests/test_profiles_masking.py -v --tb=short -k "fuzz or base_pii"
