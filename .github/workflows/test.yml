name: Tests (Mac/Linux)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install minimal test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install only cross-platform deps; skip pywin32 (Windows-only)
          # and heavy native deps that aren't needed for unit tests
          pip install pytest pydantic==2.6.1 python-dateutil==2.8.2 Pillow==10.2.0

      - name: Show installed packages
        shell: bash
        run: pip list

      - name: Run pytest (skip windows_only marker)
        shell: bash
        run: |
          if [ -d tests ] && [ -n "$(ls -A tests 2>/dev/null)" ]; then
            pytest tests/ -v -m "not windows_only"
          else
            echo "No tests in tests/ yet — skipping"
          fi
