# CircleCI: WorkScope Collector の Windows EXE ビルド
# GitHub Actions が user-level disabled / Azure 認証待ちの間のフォールバック CI。
#
# 注意:
#   - win/server-2022 image のデフォルト Python は 3.13 系で
#     Pillow 10.2 / paddle 2.6 等のホイールが無くビルドが失敗する。
#   - 各 Python ステップの先頭で PATH に C:\Python311 を前置することで
#     Python 3.11 を明示的に使う。

version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  build-windows:
    executor:
      name: win/server-2022
      size: medium
    steps:
      - checkout

      - run:
          name: Install Python 3.11 via choco
          shell: powershell.exe
          command: |
            choco install -y python311 --version=3.11.9 --no-progress
            # 後続ステップでも参照できるよう Machine PATH にも追加
            $py = "C:\Python311"
            $pyScripts = "C:\Python311\Scripts"
            $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
            [Environment]::SetEnvironmentVariable(
              "Path",
              "$py;$pyScripts;$machinePath",
              "Machine"
            )
            $env:Path = "$py;$pyScripts;" + $env:Path
            & "$py\python.exe" --version

      - run:
          name: Verify Python 3.11 is the active interpreter
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            Get-Command python | Select-Object Source
            python --version
            python -c "import sys; assert sys.version_info[:2] == (3, 11), f'Expected 3.11, got {sys.version_info[:2]}'; print('Python 3.11 OK')"
            pip --version

      - run:
          name: Show environment
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            python --version
            pip --version
            Get-Location
            Get-ChildItem

      - run:
          name: Upgrade pip
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            python -m pip install --upgrade pip wheel setuptools

      - restore_cache:
          keys:
            - pip-cache-v2-py311-{{ checksum "requirements.txt" }}
            - pip-cache-v2-py311-

      - run:
          name: Install dependencies
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            pip install -r requirements.txt

      - save_cache:
          key: pip-cache-v2-py311-{{ checksum "requirements.txt" }}
          paths:
            - C:\Users\circleci\AppData\Local\pip\Cache

      - run:
          name: Show installed packages
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            pip list

      - run:
          name: Build EXE with PyInstaller
          shell: powershell.exe
          command: |
            $env:Path = "C:\Python311;C:\Python311\Scripts;" + $env:Path
            pyinstaller pyinstaller.spec --noconfirm --clean

      - run:
          name: Verify build artifact
          shell: powershell.exe
          command: |
            if (-Not (Test-Path "dist/WorkScope.exe")) {
              Write-Error "dist/WorkScope.exe was not produced by PyInstaller"
              exit 1
            }
            Get-Item dist/WorkScope.exe | Format-List Name, Length, LastWriteTime

      - run:
          name: Stage release files
          shell: powershell.exe
          command: |
            $stage = "release-stage"
            New-Item -ItemType Directory -Force -Path $stage | Out-Null
            Copy-Item dist/WorkScope.exe -Destination $stage/
            if (Test-Path installer) {
              Get-ChildItem installer -Filter *.bat | Copy-Item -Destination $stage/
              Get-ChildItem installer -Filter *.ps1 -ErrorAction SilentlyContinue | Copy-Item -Destination $stage/
              Get-ChildItem installer -Filter *.cmd -ErrorAction SilentlyContinue | Copy-Item -Destination $stage/
              if (Test-Path installer/README_install.txt) {
                Copy-Item installer/README_install.txt -Destination $stage/
              }
            }
            if (Test-Path docs) {
              $htmls = Get-ChildItem docs -Filter *.html -ErrorAction SilentlyContinue
              if ($htmls) {
                $htmls | Copy-Item -Destination $stage/
              } else {
                Write-Host "No HTML files in docs/, skipping"
              }
            }
            Write-Host "=== Staged files ==="
            Get-ChildItem $stage | Format-Table Name, Length

      - run:
          name: Create ZIP archive
          shell: powershell.exe
          command: |
            $sha = $env:CIRCLE_SHA1.Substring(0, 7)
            $zipName = "workscope-collector-windows-$sha.zip"
            Compress-Archive -Path "release-stage/*" -DestinationPath $zipName -Force
            Write-Host "Created: $zipName"
            Get-Item $zipName | Format-List Name, Length

      - store_artifacts:
          path: .
          destination: build-output

workflows:
  version: 2
  build:
    jobs:
      - build-windows:
          filters:
            branches:
              only:
                - main
            tags:
              only:
                - /^v.*/
