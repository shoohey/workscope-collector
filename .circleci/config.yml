# CircleCI: WorkScope Collector の Windows EXE ビルド
# GitHub Actions が user-level disabled / Azure 認証待ちの間の
# 第三のフォールバック CI。
#
# - CircleCI の Free Plan は public repo で Windows medium executor を使える
# - GitHub OAuth で連携。GitHub Actions の制限とは独立に動作する
# - Windows Server 2022 image には Python 3.11 と PowerShell が同梱

version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  build-windows:
    executor:
      name: win/server-2022
      size: medium
    steps:
      - checkout

      - run:
          name: Show environment
          command: |
            python --version
            pip --version
            Get-Location
            Get-ChildItem
          shell: powershell.exe

      - run:
          name: Upgrade pip
          command: |
            python -m pip install --upgrade pip wheel setuptools
          shell: powershell.exe

      - restore_cache:
          keys:
            - pip-cache-v1-{{ checksum "requirements.txt" }}
            - pip-cache-v1-

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt
          shell: powershell.exe

      - save_cache:
          key: pip-cache-v1-{{ checksum "requirements.txt" }}
          paths:
            - C:\Users\circleci\AppData\Local\pip\Cache

      - run:
          name: Show installed packages
          command: pip list
          shell: powershell.exe

      - run:
          name: Build EXE with PyInstaller
          command: |
            pyinstaller pyinstaller.spec --noconfirm --clean
          shell: powershell.exe

      - run:
          name: Verify build artifact
          command: |
            if (-Not (Test-Path "dist/WorkScope.exe")) {
              Write-Error "dist/WorkScope.exe was not produced by PyInstaller"
              exit 1
            }
            Get-Item dist/WorkScope.exe | Format-List Name, Length, LastWriteTime
          shell: powershell.exe

      - run:
          name: Stage release files
          command: |
            $stage = "release-stage"
            New-Item -ItemType Directory -Force -Path $stage | Out-Null
            Copy-Item dist/WorkScope.exe -Destination $stage/
            if (Test-Path installer) {
              Get-ChildItem installer -Filter *.bat | Copy-Item -Destination $stage/
              if (Test-Path installer/README_install.txt) {
                Copy-Item installer/README_install.txt -Destination $stage/
              }
            }
            if (Test-Path docs) {
              $htmls = Get-ChildItem docs -Filter *.html -ErrorAction SilentlyContinue
              if ($htmls) {
                $htmls | Copy-Item -Destination $stage/
              } else {
                Write-Host "No HTML files in docs/, skipping"
              }
            }
            Write-Host "=== Staged files ==="
            Get-ChildItem $stage | Format-Table Name, Length
          shell: powershell.exe

      - run:
          name: Create ZIP archive
          command: |
            $sha = $env:CIRCLE_SHA1.Substring(0, 7)
            $zipName = "workscope-collector-windows-$sha.zip"
            Compress-Archive -Path "release-stage/*" -DestinationPath $zipName -Force
            Write-Host "Created: $zipName"
            Get-Item $zipName | Format-List Name, Length
            "ARTIFACT_ZIP=$zipName" | Out-File -Append -FilePath $env:BASH_ENV -Encoding ASCII -ErrorAction SilentlyContinue
            # CircleCI の artifact store は固定パスなので環境変数経由ではなく
            # 直接ファイルパスを store_artifacts に渡す
          shell: powershell.exe

      - store_artifacts:
          path: .
          destination: build-output
          # ZIP がワーキングディレクトリにあるので そこから artifact ストアへ

workflows:
  version: 2
  build:
    jobs:
      - build-windows:
          filters:
            branches:
              only:
                - main
            tags:
              only:
                - /^v.*/
