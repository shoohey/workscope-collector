# AppVeyor: WorkScope Collector の Windows EXE ビルド
#
# GitHub Actions がアカウントレベル制限で使えない場合の主CI。
# AppVeyor は Windows ビルドが本業で、Free プラン (private repo) でも
# 月60分 / 同時1ジョブが利用可能。GitHub OAuth で連携。
#
# === 2モードのビルド ===
#
# (1) 汎用ビルド: main ブランチへの push で自動起動
#     - 環境変数 CUSTOMER_NAME が空の場合、汎用 WorkScope.exe を生成
#     - 後方互換: 全プロファイルを同梱、定数も書き換えなし
#
# (2) 顧客別ビルド: AppVeyor Web UI の「NEW BUILD」で環境変数を上書き
#     - CUSTOMER_NAME=<顧客名>           (例: "村上薬局")
#     - INDUSTRY=<業界プロファイル>      (例: "pharmacy")
#     - ENDPOINT=<クラウド送信先URL>      (空 = USB回収モード)
#     - API_KEY=<Bearer APIキー>         (空 = USB回収モード)
#     ↓
#     - profiles/ を {base, INDUSTRY}.json のみに削減
#     - src/_build_constants.py を生成
#     - src/config.py に bootstrap 追記
#     - 同意書 docs/consent_form.html のテンプレ {{...}} を置換
#     - EXE名: WorkScope_<CUSTOMER_NAME>_<YYYYMMDD>.exe

image: Visual Studio 2022

environment:
  PYTHON: "C:\\Python311-x64"
  PYTHON_VERSION: "3.11"
  # 顧客別ビルド用の環境変数。Web UI の "NEW BUILD" で上書き可能。
  # 既定値は空文字 = 汎用ビルドモード。
  CUSTOMER_NAME: ""
  INDUSTRY: ""
  ENDPOINT: ""
  API_KEY: ""

# キャッシュ: pip + PaddleOCR モデル
cache:
  - C:\Users\appveyor\AppData\Local\pip\Cache -> requirements.txt
  - C:\Users\appveyor\.paddleocr -> requirements.txt

# trigger
branches:
  only:
    - main

skip_tags: false

install:
  - SET PATH=%PYTHON%;%PYTHON%\Scripts;%PATH%
  - python --version
  - python -m pip install --upgrade pip wheel setuptools
  - pip install -r requirements.txt
  - pip list

# ============================================================
# before_build: 顧客別ビルドモードなら profiles 削減 + 定数注入 + 同意書置換
# ============================================================
before_build:
  - ps: |
      if ($env:CUSTOMER_NAME) {
        Write-Host "================================================="
        Write-Host " Customer Build Mode"
        Write-Host "   Customer: $env:CUSTOMER_NAME"
        Write-Host "   Industry: $env:INDUSTRY"
        Write-Host "   Endpoint: $(if ($env:ENDPOINT) { $env:ENDPOINT } else { '<USB回収>' })"
        Write-Host "   API key:  $(if ($env:API_KEY) { '***set***' } else { '<none>' })"
        Write-Host "================================================="

        if (-not $env:INDUSTRY) {
          Write-Error "INDUSTRY env var is required when CUSTOMER_NAME is set"
          exit 1
        }

        # 1. 該当業界 + base 以外のプロファイルを削除
        $profilePath = "profiles\$($env:INDUSTRY).json"
        if (-not (Test-Path $profilePath)) {
          Write-Error "profile not found: $profilePath"
          Write-Host "Available profiles:"
          Get-ChildItem profiles\*.json | ForEach-Object { Write-Host "  - $($_.BaseName)" }
          exit 1
        }
        Get-ChildItem profiles\*.json | ForEach-Object {
          $name = $_.BaseName
          if ($name -ne $env:INDUSTRY -and $name -ne "base") {
            Remove-Item $_.FullName -Force
            Write-Host "  removed profile: $name"
          }
        }

        # 2. _build_constants.py を生成 (gitignore 対象)
        # NOTE: PowerShell here-string は YAML インデントと衝突するため、
        # 代わりに行ごと Add-Content で構築する。
        $buildDate = Get-Date -Format 'yyyyMMdd'
        $bcPath = "src\_build_constants.py"
        Set-Content -Path $bcPath -Value "# Auto-generated by AppVeyor - DO NOT COMMIT" -Encoding UTF8
        Add-Content -Path $bcPath -Value ('CUSTOMER_NAME = "' + $env:CUSTOMER_NAME + '"')
        Add-Content -Path $bcPath -Value ('DEFAULT_PROFILE = "' + $env:INDUSTRY + '"')
        Add-Content -Path $bcPath -Value ('UPLOAD_ENDPOINT = "' + $env:ENDPOINT + '"')
        Add-Content -Path $bcPath -Value ('UPLOAD_API_KEY = "' + $env:API_KEY + '"')
        Add-Content -Path $bcPath -Value ('BUILD_DATE = "' + $buildDate + '"')
        Write-Host "  generated $bcPath"

        # 3. config.py に bootstrap 追記 (build_for_customer.sh と同じロジック)
        $cfg = "src\config.py"
        Add-Content -Path $cfg -Value ""
        Add-Content -Path $cfg -Value "# v1.0: ビルド時定数の上書き (AppVeyor _build_constants.py)"
        Add-Content -Path $cfg -Value "try:"
        Add-Content -Path $cfg -Value "    from _build_constants import ("
        Add-Content -Path $cfg -Value "        CUSTOMER_NAME as _BUILD_CUSTOMER_NAME,"
        Add-Content -Path $cfg -Value "        DEFAULT_PROFILE as _BUILD_DEFAULT_PROFILE,"
        Add-Content -Path $cfg -Value "        UPLOAD_ENDPOINT as _BUILD_UPLOAD_ENDPOINT,"
        Add-Content -Path $cfg -Value "        UPLOAD_API_KEY as _BUILD_UPLOAD_API_KEY,"
        Add-Content -Path $cfg -Value "    )"
        Add-Content -Path $cfg -Value "    if _BUILD_CUSTOMER_NAME:"
        Add-Content -Path $cfg -Value "        CUSTOMER_NAME = _BUILD_CUSTOMER_NAME"
        Add-Content -Path $cfg -Value "    if _BUILD_DEFAULT_PROFILE:"
        Add-Content -Path $cfg -Value "        DEFAULT_PROFILE = _BUILD_DEFAULT_PROFILE"
        Add-Content -Path $cfg -Value "    if _BUILD_UPLOAD_ENDPOINT:"
        Add-Content -Path $cfg -Value "        UPLOAD_ENDPOINT = _BUILD_UPLOAD_ENDPOINT"
        Add-Content -Path $cfg -Value "    if _BUILD_UPLOAD_API_KEY:"
        Add-Content -Path $cfg -Value "        UPLOAD_API_KEY = _BUILD_UPLOAD_API_KEY"
        Add-Content -Path $cfg -Value "except ImportError:"
        Add-Content -Path $cfg -Value "    pass"
        Write-Host "  appended bootstrap to $cfg"

        # 4. 同意書テンプレ置換 (顧客名・送信先・ビルド日)
        if (Test-Path docs\consent_form.html) {
          $consent = Get-Content docs\consent_form.html -Raw -Encoding UTF8
          $endpointDisplay = if ($env:ENDPOINT) { $env:ENDPOINT } else { "（USB回収）" }
          $consent = $consent.Replace("{{CUSTOMER_NAME}}", $env:CUSTOMER_NAME)
          $consent = $consent.Replace("{{ENDPOINT}}", $endpointDisplay)
          $consent = $consent.Replace("{{BUILD_DATE}}", $buildDate)
          Set-Content -Path docs\consent_form.html -Value $consent -Encoding UTF8
          Write-Host "  rendered docs\consent_form.html"
        }
      } else {
        Write-Host "================================================="
        Write-Host " Generic Build Mode (CUSTOMER_NAME not set)"
        Write-Host "================================================="
      }

# ============================================================
# build_script: PyInstaller でビルド (EXE名は .spec 内で環境変数から決定)
# ============================================================
# NOTE:
# - .spec ファイル指定時は --name 引数が使えないので、pyinstaller.spec
#   内で os.environ['CUSTOMER_NAME'] を読んで EXE_NAME を決める実装に
#   なっている (.spec 自体が Python コードなので環境変数を参照可能).
# - PyInstaller は INFO ログを stderr に出す癖がある。PowerShell は
#   stderr 出力を NativeCommandError 扱いするので、ErrorActionPreference
#   を Continue にして $LASTEXITCODE で正規判定する.
build_script:
  - ps: |
      $ErrorActionPreference = "Continue"

      Write-Host "================================================="
      Write-Host " Building main EXE (CUSTOMER_NAME='$env:CUSTOMER_NAME')"
      Write-Host "================================================="
      pyinstaller pyinstaller.spec --noconfirm --clean --log-level WARN 2>&1 | Out-Host
      if ($LASTEXITCODE -ne 0) {
        Write-Error "PyInstaller (main) failed with exit code $LASTEXITCODE"
        exit $LASTEXITCODE
      }

      # smoke_test.exe も同時ビルド (配布物に同梱するため)
      if (Test-Path smoke_test.spec) {
        Write-Host "================================================="
        Write-Host " Building SmokeTest EXE"
        Write-Host "================================================="
        pyinstaller smoke_test.spec --noconfirm --clean --log-level WARN 2>&1 | Out-Host
        if ($LASTEXITCODE -ne 0) {
          Write-Error "PyInstaller (smoke_test) failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
      }

      # 生成された EXE を一覧表示 (デバッグ用)
      Write-Host "=== dist/ contents ==="
      Get-ChildItem dist\*.exe | Format-Table Name, Length

# ============================================================
# after_build: 配布物を release-stage にまとめて zip 化
# ============================================================
after_build:
  - ps: |
      $ErrorActionPreference = "Continue"

      # ビルドされた本体EXEを探す (CUSTOMER_NAME 有無で名前変化)
      $mainExe = Get-ChildItem dist\WorkScope*.exe |
                 Where-Object { $_.Name -notlike "*SmokeTest*" } |
                 Select-Object -First 1
      if (-not $mainExe) {
        Write-Error "Main EXE was not produced by PyInstaller"
        Write-Host "=== dist/ contents (debug) ==="
        Get-ChildItem dist\* -ErrorAction SilentlyContinue | Format-Table Name, Length
        exit 1
      }
      Get-Item $mainExe.FullName | Format-List Name, Length, LastWriteTime

      $stage = "release-stage"
      New-Item -ItemType Directory -Force -Path $stage | Out-Null

      # 本体EXE
      Copy-Item $mainExe.FullName -Destination $stage\

      # SmokeTest EXE (あれば)
      $smokeExe = Get-ChildItem dist\WorkScope*SmokeTest*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($smokeExe) {
        Copy-Item $smokeExe.FullName -Destination $stage\
        Write-Host "  staged: $($smokeExe.Name)"
      }

      # 同意書 + 操作ガイド (顧客別ビルドなら置換済み)
      foreach ($doc in @("consent_form.html", "operation_guide.html")) {
        if (Test-Path "docs\$doc") {
          Copy-Item "docs\$doc" -Destination $stage\
          Write-Host "  staged: $doc"
        }
      }

      # インストーラ補助スクリプト
      if (Test-Path installer) {
        Get-ChildItem installer -Filter *.bat -ErrorAction SilentlyContinue | Copy-Item -Destination $stage\
        if (Test-Path installer\README_install.txt) {
          Copy-Item installer\README_install.txt -Destination $stage\
        }
      }

      Write-Host "=== Staged files ==="
      Get-ChildItem $stage | Format-Table Name, Length

      # zip 化: EXE名 (既に ASCII safe 化済) を流用して命名
      # CUSTOMER_NAME が UTF-8 文字化けで '?' になっていても、EXE名は
      # pyinstaller.spec の _ascii_safe_customer_name() でハッシュ化済みなので、
      # それをそのまま zip 名にも使う. これで Windows ファイル名禁止文字を回避.
      $sha = $env:APPVEYOR_REPO_COMMIT.Substring(0, 7)
      $exeBaseName = $mainExe.BaseName  # 例: WorkScope_custe94f0bfa_20260506
      if ($env:CUSTOMER_NAME) {
        $zipName = "${exeBaseName}_$sha.zip"
      } else {
        $zipName = "workscope-collector-windows-$sha.zip"
      }
      Compress-Archive -Path "$stage\*" -DestinationPath $zipName -Force
      Write-Host "Created: $zipName"

artifacts:
  - path: WorkScope_*.zip
    name: customer_build
  - path: workscope-collector-windows-*.zip
    name: workscope-collector-windows
